<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Data Input</title>

  <style>

    body{
      font-family:Arial;
      background:#f1f5f9;
      padding:20px;
    }

    .container{
      max-width:800px;
      margin:auto;
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    h1{
      text-align:center;
      margin-bottom:20px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
    }

    table th,
    table td{
      border:1px solid #ddd;
      padding:10px;
      text-align:center;
    }

    table th{
      background:#2563eb;
      color:white;
    }

    .btn{
      display:inline-block;
      padding:10px 15px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      border-radius:5px;
      margin-top:15px;
    }
	
	.pay{
      display:inline-block;
      padding:10px 15px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      border-radius:5px;
      margin-top:15px;
	  float:rig

    }
	
    .edit{
      background:orange;
      color:white;
      border:none;
      padding:5px 10px;
      border-radius:5px;
      cursor:pointer;
    }

    .hapus{
      background:red;
      color:white;
      border:none;
      padding:5px 10px;
      border-radius:5px;
      cursor:pointer;
    }

  </style>

</head>
<body>

<div class="container">

  <h1>Data Hasil Input</h1>

  <a href="input.html" class="btn">
    Tambah Data
  </a>
  
  <a href="Pay.html" class="pay">
    Payment
  </a>

  <table>

    <thead>

      <tr>
        <th>No</th>
        <th>Nama</th>
        <th>Nilai</th>
        <th>Action</th>
      </tr>

    </thead>

    <tbody id="dataTable">

    </tbody>

  </table>

</div>

<script>

  let data =
  JSON.parse(localStorage.getItem("dataSiswa"))
  || [];

  const tbody =
  document.getElementById("dataTable");

  function tampilkanData(){

    tbody.innerHTML = "";

    data.forEach((item,index)=>{

      tbody.innerHTML += `

        <tr>

          <td>${index + 1}</td>

          <td>${item.nama}</td>

          <td>${item.nilai}</td>

          <td>

            <button
            class="edit"
            onclick="editData(${index})">

              Edit

            </button>

            <button
            class="hapus"
            onclick="hapusData(${index})">

              Hapus

            </button>

          </td>

        </tr>

      `;

    });

  }

  function hapusData(index){

    if(confirm("Yakin ingin menghapus data?")){

      data.splice(index,1);

      localStorage.setItem(
        "dataSiswa",
        JSON.stringify(data)
      );

      tampilkanData();

    }

  }

 function editData(index){

    let namaBaru =
    prompt(
      "Edit Nama",
      data[index].nama
    );

    let nilaiBaru =
    prompt(
      "Edit Nilai",
      data[index].nilai
    );

    if(
      namaBaru != null &&
      nilaiBaru != null
    ){

      data[index].nama = namaBaru;

      data[index].nilai = nilaiBaru;

      localStorage.setItem(
        "dataSiswa",
        JSON.stringify(data)
      );

      tampilkanData();

    }

  }

  tampilkanData();

</script>

</body>
</html>
